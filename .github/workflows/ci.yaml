name: Infrastructure CI Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-chaos-platform:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Set up Kind Cluster
      uses: engineerd/setup-kind@v0.6.0
      with:
        version: "v0.20.0"
        cluster-name: "chaos-sandbox"

    - name: Verify Cluster Core Nodes
      run: |
        kubectl cluster-info
        kubectl get nodes

    - name: Install Helm & Deploy LitmusChaos Operator
      run: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm repo add litmuschaos https://litmuschaos.github.io/litmus-helm/
        helm repo update
        kubectl create namespace litmus
        helm install litmus litmuschaos/litmus-helm --namespace litmus --wait

    - name: Deploy Target Applications & RBAC Setup
      run: |
        # Create namespace first
        kubectl create namespace target-zone --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f manifests/sample-app.yaml
        kubectl create serviceaccount litmus-admin -n target-zone --dry-run=client -o yaml | kubectl apply -f -
        kubectl create clusterrolebinding litmus-admin-role --clusterrole=cluster-admin --serviceaccount=target-zone:litmus-admin --dry-run=client -o yaml | kubectl apply -f -

    - name: Test Infrastructure Convergence
      run: |
        echo "Validating target microservices are running smoothly..."
        kubectl wait --for=condition=available deployment/core-api-service -n target-zone --timeout=60s
