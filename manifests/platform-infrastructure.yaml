apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-backend
  namespace: target-zone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-backend
  template:
    metadata:
      labels:
        app: chaos-backend
    spec:
      containers:
      - name: backend-api
        image: chaos-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-backend-service
  namespace: target-zone
spec:
  type: ClusterIP
  selector:
    app: chaos-backend
  ports:
  - port: 8000
    targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-frontend
  namespace: target-zone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-frontend
  template:
    metadata:
      labels:
        app: chaos-frontend
    spec:
      containers:
      - name: frontend-ui
        image: chaos-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-frontend-service
  namespace: target-zone
spec:
  type: ClusterIP
  selector:
    app: chaos-frontend
  ports:
  - port: 3000
    targetPort: 3000
