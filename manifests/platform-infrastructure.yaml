apiVersion: v1
kind: Namespace
metadata:
  name: target-zone
---
# 1. RBAC Permissions for Chaos Backend Controller
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-backend-sa
  namespace: target-zone
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chaos-backend-role
  namespace: target-zone
rules:
  - apiGroups: ["litmuschaos.io"]
    resources: ["chaosengines", "chaosresults", "chaosexperiments"]
    verbs: ["create", "get", "list", "watch", "delete", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chaos-backend-rb
  namespace: target-zone
subjects:
  - kind: ServiceAccount
    name: chaos-backend-sa
    namespace: target-zone
roleRef:
  kind: Role
  name: chaos-backend-role
  apiGroup: rbac.authorization.k8s.io

---
# 2. Chaos Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-backend
  namespace: target-zone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-backend
  template:
    metadata:
      labels:
        app: chaos-backend
    spec:
      serviceAccountName: chaos-backend-sa
      containers:
        - name: backend-api
          image: asia-south1-docker.pkg.dev/chaos-platform/chaos-repo/chaos-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: chaos-backend-service
  namespace: target-zone
spec:
  type: NodePort
  selector:
    app: chaos-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001

---
# 3. Chaos Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-frontend
  namespace: target-zone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-frontend
  template:
    metadata:
      labels:
        app: chaos-frontend
    spec:
      containers:
        - name: frontend-ui
          image: asia-south1-docker.pkg.dev/chaos-platform/chaos-repo/chaos-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: chaos-frontend-service
  namespace: target-zone
spec:
  type: LoadBalancer
  selector:
    app: chaos-frontend
  ports:
    - port: 80
      targetPort: 80